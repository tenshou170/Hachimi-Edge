name: Create Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v5
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Hachimi for Windows
        run: |
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release
          move build\x86_64-pc-windows-msvc\release\hachimi.dll build

      - name: Build Cellar
        run: |
          git clone --depth 1 --revision d4c3f79801c8131e26df585766c35e5ce11ec57f https://github.com/Hachimi-Hachimi/Cellar
          cd Cellar
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release
          move build\x86_64-pc-windows-msvc\release\cellar.dll build
          cd ..

      - name: Check out FunnyHoney
        run: git clone --depth 1 --revision 418b5348bd9b7376cc7485c591ca69d49aa4d805 https://codeberg.org/LeadRDRK/FunnyHoney.git

      - name: Build Installer
        run: |
          git clone --depth 1 --revision 552d4afe6b77925519f7b0ee81cc3ee93ce68b13 https://github.com/teiosteppa/Installer
          copy build\hachimi.dll Installer
          move Cellar\build\cellar.dll Installer
          move FunnyHoney\FunnyHoney.exe Installer
          cd Installer
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release --features compress_bin
          cd ..
          move Installer\build\x86_64-pc-windows-msvc\release\hachimi_installer.exe build

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            build/hachimi.dll
            build/hachimi_installer.exe

  create-release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Get release version
        id: get_info
        run: |
          VERSION=$(curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/Cargo.toml" | \
            awk '/^\[package\]/{flag=1} flag && /^version/{print $3; exit}' | \
            tr -d '"')
          echo "RELEASE_VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release notes
        run: |
          # Use HEAD if the tag doesn't exist yet
          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            END_REF="$LATEST_TAG"
          else
            END_REF="HEAD"
          fi

          # Get previous tag or first commit
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${END_REF}^" 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD | tail -n 1)
          fi

          echo "## What's Changed" > CHANGELOG.md

          # Create a cache file for author names to avoid redundant API calls
          touch author_cache.txt
          ref_range="${PREVIOUS_TAG}..${END_REF}"
          if [ "$PREVIOUS_TAG" = "$(git rev-parse $END_REF)" ]; then
            ref_range="$END_REF"
          fi

          commits_since_last_release=$(git log $ref_range --pretty=format:"%h")
          for hash in $commits_since_last_release; do
            subject=$(git show -s --format=%s $hash)
            body=$(git show -s --format=%b $hash)
            git_author=$(git show -s --format=%an $hash)
            short_hash=$(git show -s --format=%h $hash)

            # Try to get GitHub username from cache or API
            author_login=$(grep "^$git_author:" author_cache.txt | cut -d: -f2 || echo "")
            if [ -z "$author_login" ]; then
              author_login=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/commits/$hash" | \
                jq -r '.author.login' 2>/dev/null)
              
              if [ "$author_login" = "null" ] || [ -z "$author_login" ]; then
                author_login="$git_author"
              else
                echo "$git_author:$author_login" >> author_cache.txt
              fi
            fi

            echo "* **$subject**" >> CHANGELOG.md

            if [ -n "$body" ]; then
              echo "$body" | while read -r line; do
                if [ -z "$line" ]; then continue; fi
                clean_line=$(echo "$line" | sed 's/^ *//;s/ *$//')
                [ -n "$clean_line" ] && echo "    * $clean_line" >> CHANGELOG.md
              done
            fi
            echo "    (by @$author_login in $short_hash)" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          done

          unset IFS
        env:
          LATEST_TAG: ${{ env.RELEASE_VERSION }}

      - name: Upload binaries to a release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            artifacts/windows/*
          tag_name: ${{ env.RELEASE_VERSION }}
